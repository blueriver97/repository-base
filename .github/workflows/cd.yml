# .github/workflows/cd.yml

name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "배포 환경 선택 (prod 또는 dev)"
        required: true
        type: string

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 입력받은 environment 값으로 strategy를 설정합니다.
    strategy:
      matrix:
        include:
          - environment: dev
            ref: "develop"
            host: ${{ secrets.DEV_HOST }}
            user: ${{ secrets.DEV_USER }}
            key: ${{ secrets.DEV_DEPLOY_KEY }}
          - environment: prod
            ref: "main"
            host: ${{ secrets.PROD_HOST }}
            user: ${{ secrets.PROD_USER }}
            key: ${{ secrets.PROD_DEPLOY_KEY }}

    # workflow_dispatch의 입력값과 matrix의 environment가 일치할 때만 실행
    if: github.event.inputs.environment == matrix.environment

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}

      - name: 환경 변수 설정
        run: echo "PROJECT_NAME=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> "$GITHUB_ENV"

      - name: 배포 서버 환경 준비
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ matrix.host }}
          username: ${{ matrix.user }}
          key: ${{ matrix.key }}
          script: |
            sudo mkdir -p /opt/${{ env.PROJECT_NAME }}
            sudo chown -R ${{ matrix.user }}:${{ matrix.user }} /opt/${{ env.PROJECT_NAME }}

      - name: 코드 배포
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -az --delete
          path: ./
          remote_path: /opt/${{ env.PROJECT_NAME }}
          remote_host: ${{ matrix.host }}
          remote_user: ${{ matrix.user }}
          remote_key: ${{ matrix.key }}
